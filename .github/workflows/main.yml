name: Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        run: |
          gcp configure set gcp_access_key_id ${{ secrets.GCP_ACCESS_KEY }}
          gcp configure set gcp_secret_access_key ${{ secrets.GCP_SECRET_KEY }}

      - name: Deploy Application
        run: echo "Deploying to GCP..."
